<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortnite Sprite Tracker</title>

    <meta name="description" content="Track and share your Fortnite sprite collection. Mark sprites as collected or mastered, filter by theme, and export collection images.">
    <meta name="theme-color" content="#0a0c11">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Fortnite Sprites Tracker">
    <meta property="og:description" content="Track and share your Fortnite sprite collection.">
    <meta property="og:image" content="siteimages/staticsprite.png">

    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Fortnite Sprites Tracker">
    <meta name="twitter:description" content="Track and share your Fortnite sprite collection.">
    <meta name="twitter:image" content="siteimages/staticsprite.png">

    <link rel="icon" type="image/png" href="siteimages/staticsprite.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">

    <script src="sprites-data.js" defer></script>
    <script src="share-utils.js" defer></script>
    <script src="app.js" defer></script>
</head>
<body>

<header class="topbar">
    <div class="topbar-inner">
        <a class="brand" href="index.html">
            <img src="siteimages/staticsprite.png" alt="" class="brand-mascot">
            <span class="brand-title">SPRITES <em>TRACKER</em></span>
        </a>

        <div class="topbar-stats">
            <div class="stat-pill" title="Collection progress">
                <span class="stat-label">COLLECTED</span>
                <span class="stat-value" id="live-counter-ratio">0 / 0</span>
                <div class="stat-bar"><div class="stat-bar-fill collected-fill" id="live-counter-bar"></div></div>
            </div>
            <div class="stat-pill" title="Mastery progress">
                <span class="stat-label">MASTERED</span>
                <span class="stat-value" id="mastery-counter-ratio">0 / 0</span>
                <div class="stat-bar"><div class="stat-bar-fill mastery-fill" id="mastery-counter-bar"></div></div>
            </div>
        </div>

        <div class="topbar-actions">
            <div class="dropdown" id="exportDropdown">
                <button class="btn btn-ghost" id="exportMenuBtn" aria-haspopup="true" aria-expanded="false" title="Generate a shareable image of your sprites">
                    📸 GENERATE IMAGE <span class="caret">▾</span>
                </button>
                <div class="dropdown-menu" id="exportMenu" role="menu">
                    <button class="dropdown-item" data-export="collected"><span class="dot dot-green"></span> My collection</button>
                    <button class="dropdown-item" data-export="missing"><span class="dot dot-red"></span> Missing sprites</button>
                    <button class="dropdown-item" data-export="mastered"><span class="dot dot-gold"></span> Mastered sprites</button>
                    <button class="dropdown-item" data-export="unmastered"><span class="dot dot-cyan"></span> Unmastered sprites</button>
                </div>
            </div>
            <button class="btn btn-primary" id="shareBtn">🔗 SHARE</button>
        </div>
    </div>
</header>

<div class="view-mode-banner" id="viewModeBanner" style="display: none;">
    <div class="view-mode-text">👀 Viewing a shared collection</div>
    <div class="compare-chips">
        <button class="compare-chip active" data-cmp="theirs">THEIR SPRITES <span class="chip-count" id="cmp-count-theirs"></span></button>
        <button class="compare-chip" data-cmp="need">I'M MISSING <span class="chip-count" id="cmp-count-need"></span></button>
        <button class="compare-chip" data-cmp="have">THEY'RE MISSING <span class="chip-count" id="cmp-count-have"></span></button>
    </div>
    <div class="view-mode-actions">
        <button class="btn btn-primary btn-small" id="importSharedBtn">📥 IMPORT AS MINE</button>
        <a href="index.html" class="btn btn-ghost btn-small">MY TRACKER</a>
    </div>
</div>

<div class="container">
    <div class="app-layout">
        <aside class="sidebar">
            <div class="panel-box">
                <label class="filter-header" for="search">Search</label>
                <input type="text" id="search" class="fn-input" placeholder="Search sprites…" autocomplete="off">

                <label class="filter-header" for="theme-filter">Theme</label>
                <select id="theme-filter" class="fn-select">
                    <option value="all">ALL THEMES</option>
                    <!-- options generated from THEME_CONFIG by app.js -->
                </select>

                <div class="filter-header">Status</div>
                <div class="toggle-container">
                    <button class="toggle-btn" id="toggle-all">ALL</button>
                    <button class="toggle-btn" id="toggle-owned">OWNED</button>
                    <button class="toggle-btn" id="toggle-unowned">MISSING</button>
                </div>

                <div class="filter-header">Options</div>
                <label class="switch-row">
                    <span class="switch-label">Hide mastered</span>
                    <input type="checkbox" id="hide-mastered-switch" class="switch-input">
                </label>
                <label class="switch-row">
                    <span class="switch-label">Group by theme</span>
                    <input type="checkbox" id="group-theme-switch" class="switch-input">
                </label>
                <label class="switch-row">
                    <span class="switch-label">Show unreleased</span>
                    <input type="checkbox" id="unreleased-switch" class="switch-input">
                </label>
                <label class="switch-row">
                    <span class="switch-label">Low fidelity mode</span>
                    <input type="checkbox" id="low-fidelity-switch" class="switch-input">
                </label>

                <div class="filter-header" id="backupHeader">Backup</div>
                <div class="backup-btns" id="backupBtns">
                    <button class="btn btn-ghost btn-small" id="backupExportBtn" title="Download your collection as a JSON file">⬇ Export</button>
                    <button class="btn btn-ghost btn-small" id="backupImportBtn" title="Restore a collection from a backup file">⬆ Import</button>
                    <input type="file" id="backupFileInput" accept=".json,application/json" hidden>
                </div>

                <div class="hint-box">
                    💡 Click a card to collect it. Hit the 👑 on a collected card to master it.
                </div>
            </div>

            <div class="panel-box creator-card">
                <button class="close-creator-btn" id="closeCreatorBtn" title="Hide for this session">✕</button>
                <div class="creator-title">Made by Rick</div>
                <a href="https://youtube.com/@rickventure" class="creator-link" target="_blank">
                    <img src="siteimages/rickpfpeak.png" class="creator-img" alt="Rickventure Channel">
                </a>
                <a href="https://youtube.com/@rickventure?sub_confirmation=1" class="sub-btn" target="_blank">sub 2 me</a>
                <div class="creator-subtext">
                    Help me reach 1,000 subscribers so I can put a creator code here.
                </div>
                <div class="modified-by">
                    Modified by <a href="https://github.com/JuanMusic1" target="_blank" rel="noopener">JuanMusic1</a>
                </div>
            </div>
        </aside>

        <main id="spriteGrid" class="grid-area"></main>
    </div>
</div>

</body>
</html>
